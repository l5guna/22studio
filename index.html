<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>22 Studio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        header {
            background: #1f1f1f;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: #1c1c1c;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        button {
            background: #ff0055;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #ff3377;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: #1f1f1f;
            font-size: 14px;
        }

        /* 🎬 ЗАСТАВКА */
        #splash {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .splash-content {
            text-align: center;
        }

        #present-text {
            font-size: 20px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            opacity: 0;
            animation: textFade 2s ease forwards;
        }

        #logo {
            width: 200px;
            opacity: 0;
            animation: logoFade 3s ease forwards;
        }

        @keyframes textFade {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes logoFade {
            0% { opacity: 0; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.2); }
        }

        /* 🔥 СЛАЙДЕР */
        .compare-container {
            position: relative;
            width: 500px;
            margin: 40px auto;
            overflow: hidden;
            border-radius: 15px;
        }

        .compare-img {
            width: 100%;
            display: block;
        }

        .compare-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            overflow: hidden;
        }

        .compare-slider {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: white;
            cursor: ew-resize;
        }

        .compare-slider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -8px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>

<body onclick="document.getElementById('intro-sound').play()">

<!-- 🎬 ЗАСТАВКА -->
<div id="splash">
    <div class="splash-content">
        <p id="present-text">22 Studio presents</p>
        <img src="logo.png" id="logo">
        <audio id="intro-sound" src="sound.mp3"></audio>
    </div>
</div>

<!-- 🎮 САЙТ -->
<header>
    <img src="logo.png" style="width:100px;">
    <div>22 STUDIO 🎮</div>
</header>

<div class="container">

    <h1>Добро пожаловать в 22 Studio</h1>
    <p>Мы делаем лучшие (почти) игры в мире 😎</p>

    <!-- 🔥 СЛАЙДЕР -->
    <div class="compare-container" id="compare">
        <img src="before.jpg" class="compare-img">

        <div class="compare-overlay" id="overlay">
            <img src="after.jpg" class="compare-img">
        </div>

        <div class="compare-slider" id="slider"></div>
    </div>

    <div class="card">
        <h2>Наша игра</h2>
        <button onclick="alert('Ты нашёл пасхалку 😂')">Нажми меня</button>
    </div>

    <div class="card">
        <h2>Команда</h2>
        <p>Коля — гений разработки 💻</p>
        <p>Ты — веб-мастер 🔥</p>
    </div>

    <div class="card">
        <h2>Факты</h2>
        <p> Основано в 2068</p>
        <p> Сделано с говной</p>
        <p>1488</p>
    </div>

</div>

<footer>
    © 2026 22 Studio. 
</footer>

<!-- ⚙️ СКРИПТ -->
<script>
    // 🎬 ЗАСТАВКА + ЗВУК
    window.onload = () => {
        const sound = document.getElementById("intro-sound");

        sound.play().catch(() => {
            console.log("Автозвук заблокирован");
        });

        setTimeout(() => {
            document.getElementById("splash").style.display = "none";
        }, 4000);
    };

    // 🔥 СЛАЙДЕР
    const slider = document.getElementById("slider");
    const overlay = document.getElementById("overlay");
    const container = document.getElementById("compare");

    let isDragging = false;

    slider.addEventListener("mousedown", () => {
        isDragging = true;
    });

    window.addEventListener("mouseup", () => {
        isDragging = false;
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        const rect = container.getBoundingClientRect();
        let x = e.clientX - rect.left;

        if (x < 0) x = 0;
        if (x > rect.width) x = rect.width;

        const percent = (x / rect.width) * 100;

        overlay.style.width = percent + "%";
        slider.style.left = percent + "%";
    });
</script>

</body>
</html>
